<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Install Nothing – Terminal Simulator</title>
    <link rel="stylesheet" href="lib/xterm/xterm.css" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Fira+Code:wght@400;600&family=Source+Code+Pro:wght@400;600&family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-21D1YMQ1SG"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-21D1YMQ1SG');

    <style>
      html, body { height: 100%; margin: 0; background: #0b0b0b; color: #e6e6e6; font-family: Inter, system-ui, sans-serif; }
      .app { max-width: 960px; margin: 48px auto; padding: 0 16px; }
      .controls { display: grid; grid-template-columns: 1fr 1fr 1.4fr 0.6fr 1fr auto; gap: 12px; align-items: end; }
      .time-input { display: flex; gap: 6px; align-items: center; }
      .time-input select { width: 5.2rem; padding: 8px; background: #141414; color: #e6e6e6; border: 1px solid #2a2a2a; border-radius: 6px; }
      .time-input select:disabled { opacity: .5; cursor: not-allowed; }
      label { font-size: 12px; color: #aaa; display: block; margin-bottom: 6px; }
      select, input[type="number"] { width: 100%; padding: 8px; background: #141414; color: #e6e6e6; border: 1px solid #2a2a2a; border-radius: 6px; }
      button { padding: 10px 16px; background: #3d8bfd; color: #fff; border: 0; border-radius: 6px; cursor: pointer; }
      button:disabled { opacity: .6; cursor: not-allowed; }
      .terminal-wrap { display: none; position: fixed; inset: 0; background: #000; }
      #terminal { position: absolute; inset: 0; }
      .topbar { position: absolute; top: 0; left: 0; right: 0; height: 44px; background: rgba(0,0,0,.7); color: #bbb; display: flex; align-items: center; padding: 0 12px; gap: 12px; z-index: 10; opacity: 0; pointer-events: none; transition: opacity .2s ease-in-out; border-bottom: 1px solid rgba(255,255,255,.06); backdrop-filter: blur(2px); }
      .topbar.visible { opacity: 1; pointer-events: auto; }
      .topbar strong { margin-right: 8px; color: #eee; }
      .topbar button { background: #222; color: #ddd; border: 1px solid #333; }
      .separator { opacity: .45; padding: 0 6px; }
      .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; border: 1px solid #333; background: #111; color: #ddd; }
      .badge.status.ok { background: rgba(0,128,0,.15); border-color: #1f7a1f; color: #8ef08e; }
      .badge.status.warn { background: rgba(204,153,0,.12); border-color: #7a5f00; color: #ffd24d; }
      .badge.status.err { background: rgba(153,0,0,.15); border-color: #7a1f1f; color: #ff8c8c; }
      .badge.countdown { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace; color: #a3e7ff; border-color: #1f3a7a; background: rgba(0,64,128,.12); }

      /* Theme preview gallery */
      .gallery-wrap { max-width: 1200px; margin: 32px auto; padding: 0 16px; }
      .gallery-title { margin: 0 0 12px 0; color: #cfcfcf; font-size: 16px; }
      .gallery { display: grid; gap: 12px; grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .card { background: #111; border: 1px solid #222; border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform .08s ease-in-out, border-color .2s; }
      .card:hover { transform: translateY(-2px); border-color: #2a2a2a; }
      .card img { display: block; width: 100%; height: auto; }
      .card .title { display:flex; align-items:center; justify-content:space-between; gap:8px; padding: 8px 10px; border-top: 1px solid #222; color: #ccc; font-size: 13px; }
      .use-btn { background: #0a84ff; color: #fff; border: 0; border-radius: 6px; padding: 4px 8px; font-size: 12px; cursor: pointer; }
      .use-btn:hover { filter: brightness(1.1); }

      /* Lightbox overlay */
      .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,.85); display: none; align-items: center; justify-content: center; z-index: 100; }
      .lightbox.visible { display: flex; }
      .lightbox-content { max-width: 92vw; max-height: 90vh; text-align: center; }
      .lightbox-content img { max-width: 100%; max-height: 80vh; border: 1px solid #333; border-radius: 6px; box-shadow: 0 10px 30px rgba(0,0,0,.6); }
      .lightbox-caption { margin-top: 10px; color: #ddd; font-size: 14px; }
      .lightbox-close { position: absolute; top: 16px; right: 16px; background: #222; color: #ddd; border: 1px solid #333; border-radius: 6px; padding: 6px 10px; cursor: pointer; }

      /* Footer */
      .app-footer { text-align: center; padding: 24px 0; color: #666; font-size: 12px; }
      .app-footer a { color: #888; }
      .app-footer a:hover { color: #aaa; }

      /* Responsive tweaks */
      @media (max-width: 1024px) {
        .app { margin: 32px auto; }
        .controls { grid-template-columns: 1fr 1fr 1fr; }
        .gallery { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      }

      @media (max-width: 720px) {
        .app { margin: 28px auto; }
        h1 { font-size: 1.35rem; }
        .controls { grid-template-columns: 1fr 1fr; }
        .time-input { flex-wrap: wrap; }
        .time-input select { width: 100%; }
        .gallery { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        /* Bigger touch targets to avoid iOS zoom */
        button, select, input[type="number"] { font-size: 16px; min-height: 42px; }
        .use-btn { padding: 6px 10px; }
        /* Topbar wraps neatly on mobile overlay */
        .topbar { height: auto; flex-wrap: wrap; gap: 8px; padding: 6px 8px; }
        .topbar > span { flex: 1 0 100%; }
      }

      @media (max-width: 480px) {
        .app { margin: 22px auto; padding: 0 12px; }
        h1 { font-size: 1.15rem; }
        .controls { grid-template-columns: 1fr; gap: 10px; }
        .gallery { grid-template-columns: 1fr; }
        .card .title { font-size: 12px; padding: 8px; }
        .lightbox-content { max-width: 96vw; }
        .lightbox-content img { max-height: 64vh; }
        .lightbox-close { padding: 10px 14px; font-size: 14px; }
      }
    </style>
  </head>
  <body>
    <div class="app" id="app">
      <h1>Install Nothing – Terminal Simulator</h1>
      <p>Pick a terminal theme, a tech-stack preset, and a duration, then start the simulation.</p>
      <div class="controls">
        <div>
          <label for="theme">Theme</label>
          <select id="theme">
            <optgroup label="Popular">
              <option value="dracula">Dracula</option>
              <option value="one-dark">One Dark</option>
              <option value="solarized-dark">Solarized Dark</option>
              <option value="gruvbox-dark">Gruvbox Dark</option>
              <option value="nord">Nord</option>
              <option value="monokai">Monokai</option>
            </optgroup>
            <optgroup label="macOS Terminal">
              <option value="macos-basic">macOS Basic</option>
              <option value="macos-pro">macOS Pro</option>
              <option value="macos-homebrew">macOS Homebrew</option>
            </optgroup>
            <optgroup label="Windows">
              <option value="windows-cmd">Windows CMD</option>
              <option value="windows-powershell">Windows PowerShell</option>
            </optgroup>
            <optgroup label="Linux Distros">
              <option value="ubuntu">Ubuntu</option>
              <option value="debian">Debian</option>
              <option value="redhat">Red Hat</option>
              <option value="mint">Linux Mint</option>
            </optgroup>
          </select>
        </div>
        <div>
          <label for="stack">Simulator</label>
          <select id="stack">
            <option value="default">All Stages (default)</option>
            <option value="bios">BIOS</option>
            <option value="boot">Boot</option>
            <option value="bootloader">Bootloader</option>
            <option value="filesystem">Filesystem</option>
            <option value="system">System</option>
            <option value="network">Network</option>
            <option value="drivers">Drivers</option>
            <option value="initramfs">Initramfs</option>
            <option value="packages">Packages</option>
            <option value="kernel">Kernel</option>
            <option value="compilation">Compilation</option>
            <option value="deno">Deno</option>
            <option value="database">Database</option>
            <option value="xorg">Xorg</option>
            <option value="services">Services</option>
            <option value="retro">Retro</option>
            <option value="locale">Locale</option>
            <option value="container">Container</option>
            <option value="ai">AI</option>
            <option value="cloud">Cloud</option>
          </select>
        </div>
        <div>
          <label>Duration (HH:MM:SS) or Endless</label>
          <div class="time-input">
            <select id="durationH" aria-label="Hours"></select>
            <span>:</span>
            <select id="durationM" aria-label="Minutes"></select>
            <span>:</span>
            <select id="durationS" aria-label="Seconds"></select>
            <label style="margin-left:8px; display:flex; align-items:center; gap:6px;">
              <input id="endless" type="checkbox" />
              Endless
            </label>
          </div>
        </div>
        <div>
          <label for="fontsize">Font size (px)</label>
          <select id="fontsize">
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10" selected>10</option>
            <option value="11">11</option>
            <option value="12">12</option>
            <option value="13">13</option>
            <option value="14">14</option>
            <option value="16">16</option>
            <option value="18">18</option>
            <option value="20">20</option>
            <option value="22">22</option>
            <option value="24">24</option>
            <option value="26">26</option>
            <option value="28">28</option>
          </select>
        </div>
        <div>
          <label for="fontfamily">Font family</label>
          <select id="fontfamily">
            <option value="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace">System Default</option>
            <option value="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace">JetBrains Mono</option>
            <option value="'Fira Code', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace">Fira Code</option>
            <option value="'Source Code Pro', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace">Source Code Pro</option>
            <option value="'Ubuntu Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace">Ubuntu Mono</option>
            <option value="Consolas, 'Courier New', monospace">Consolas</option>
            <option value="Menlo, Monaco, 'Courier New', monospace">Menlo</option>
            <option value="Monaco, 'Courier New', monospace">Monaco</option>
            <option value="'Courier New', monospace">Courier New</option>
          </select>
        </div>
        <div>
          <button id="startBtn">Start</button>
        </div>
      </div>

      <div class="gallery-wrap">
        <div class="gallery-title">Theme Previews</div>
        <div class="gallery" id="themeGallery"></div>
      </div>

      <footer class="app-footer">
        <a href="/">Home</a> · <a href="/acknowledgements.html">Acknowledgements</a> · Based on work by <a href="https://github.com/buyukakyuz" target="_blank">Kerim Buyukakyuz</a>
      </footer>
    </div>

    <div class="terminal-wrap" id="terminalWrap">
      <div class="topbar" id="topbar">
        <strong>Simulation</strong>
        <span>
          Status: <span id="status" class="badge status">-</span>
          <span class="separator">|</span>
          Simulator: <span id="simval" class="badge sim">-</span>
          <span class="separator">|</span>
          Theme: <span id="themeval" class="badge theme">-</span>
          <span class="separator">|</span>
          Duration countdown: <span id="countdown" class="badge countdown" aria-live="polite" title="Time remaining">00:00:00</span>
        </span>
        <div style="flex:1"></div>
        <button id="playPauseBtn">Pause</button>
        <button id="restartBtn">Restart</button>
        <button id="stopBtn">Stop</button>
        <button id="shareBtn" title="Copy shareable URL">Share</button>
      </div>
      <div id="terminal"></div>
    </div>

    <script src="lib/xterm/xterm.js"></script>
    <script src="lib/xterm/xterm-addon-fit.js"></script>
    <script src="js/app.js"></script>
  </body>
  </html>
